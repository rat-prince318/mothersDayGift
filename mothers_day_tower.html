            ctx.restore();
        });
    }

    function drawSunRays(ctx, w, h, time) {
        ctx.save();
        ctx.globalAlpha = 0.15;
        ctx.translate(w * 0.5, h * 0.15);

        for (let i = 0; i < 12; i++) {
            const angle = (i / 12) * Math.PI * 2 + time * 0.0001;
            const rayLength = h * 0.8;
            const rayWidth = 15 + Math.sin(time * 0.001 + i) * 5;

            ctx.save();
            ctx.rotate(angle);

            const rayGrad = ctx.createLinearGradient(0, 0, 0, rayLength);
            rayGrad.addColorStop(0, 'rgba(255, 250, 200, 0.6)');
            rayGrad.addColorStop(0.3, 'rgba(255, 240, 180, 0.3)');
            rayGrad.addColorStop(1, 'transparent');

            ctx.fillStyle = rayGrad;
            ctx.beginPath();
            ctx.moveTo(-rayWidth / 2, 0);
            ctx.lineTo(0, rayLength);
            ctx.lineTo(rayWidth / 2, 0);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        ctx.restore();
    }

    function drawVolumetricCloud(ctx, cloud, time) {
        ctx.save();
        ctx.translate(cloud.x, cloud.y);

        // 云朵阴影（底部）
        ctx.fillStyle = 'rgba(180, 190, 200, 0.3)';
        cloud.puffs.forEach(puff => {
            ctx.beginPath();
            ctx.arc(puff.ox, puff.oy + 5, puff.r * 0.9, 0, Math.PI * 2);
            ctx.fill();
        });

        // 云朵主体
        ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
        cloud.puffs.forEach(puff => {
            const puffGrad = ctx.createRadialGradient(puff.ox, puff.oy - puff.r * 0.2, 0, puff.ox, puff.oy, puff.r);
            puffGrad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            puffGrad.addColorStop(0.6, 'rgba(250, 252, 255, 0.9)');
            puffGrad.addColorStop(1, 'rgba(240, 245, 250, 0.7)');

            ctx.fillStyle = puffGrad;
            ctx.beginPath();
            ctx.arc(puff.ox, puff.oy, puff.r, 0, Math.PI * 2);
            ctx.fill();
        });

        // 云朵高光
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        cloud.puffs.forEach(puff => {
            ctx.beginPath();
            ctx.arc(puff.ox - puff.r * 0.3, puff.oy - puff.r * 0.3, puff.r * 0.3, 0, Math.PI * 2);
            ctx.fill();
        });

        ctx.restore();
    }

    // ============================================
    // 绘制全局背景（金色光点）
    // ============================================
    function drawBackground(ctx, w, h, time) {
        ctx.clearRect(0, 0, w, h);

        const gradient = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h));
        gradient.addColorStop(0, '#2d2640');
        gradient.addColorStop(1, '#0f0a15');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);

        globalParticles.forEach(p => {
            const twinkle = Math.sin(time * 0.003 + p.twinkle);
            const opacity = p.opacity * (0.5 + twinkle * 0.5);

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 215, 150, ${opacity})`;
            ctx.fill();

            const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 3);
            glow.addColorStop(0, `rgba(255, 200, 100, ${opacity * 0.3})`);
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow;
            ctx.fillRect(p.x - p.size * 3, p.y - p.size * 3, p.size * 6, p.size * 6);

            p.y -= p.speedY;
            if (p.y < -10) {
                p.y = h + 10;
                p.x = Math.random() * w;
            }
        });
    }

    // ============================================
    // 过渡动画
    // ============================================
    function drawTransition(ctx, w, h, opacity) {
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = `rgba(10, 5, 15, ${opacity})`;
        ctx.fillRect(0, 0, w, h);
    }

    // ============================================
    // 第一人称爬塔动画
    // ============================================
    function drawSpiralStaircase(ctx, w, h, progress, phase, time) {
        ctx.clearRect(0, 0, w, h);

        let viewAngle = 0;
        let viewHeight = 0;
        let viewBob = 0;

        if (phase === 0) {
            viewAngle = progress * Math.PI * 0.5;
        } else if (phase === 1) {
            viewAngle = Math.PI * 0.5;
            viewHeight = progress;
            viewBob = Math.sin(progress * Math.PI * 8) * 0.02;
        } else if (phase === 2) {
            viewAngle = Math.PI * 0.5 * (1 - progress);
            viewHeight = 1;
        }

        ctx.save();
        ctx.translate(w / 2, h / 2);
        drawTowerInterior(ctx, w, h, viewAngle, viewHeight, viewBob, time);
        ctx.restore();
    }

    function drawTowerInterior(ctx, w, h, angle, height, bob, time) {
        const brightness = 0.15 + height * 0.1;
        const bgGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(w, h) * 0.7);
        bgGrad.addColorStop(0, `rgba(${45 + height * 20}, ${40 + height * 15}, ${60 + height * 10}, 1)`);
        bgGrad.addColorStop(1, `rgba(${15 + height * 5}, ${10 + height * 5}, ${25 + height * 5}, 1)`);
        ctx.fillStyle = bgGrad;
        ctx.fillRect(-w, -h, w * 2, h * 2);

        drawSpiralStairs(ctx, w, h, angle, height, bob, time);
        drawTowerWalls(ctx, w, h, angle, height, time);
        drawVisibleSteps(ctx, w, h, angle, height, bob, time);
        drawClimbParticles(ctx, w, h, height, time);
    }

    function drawSpiralStairs(ctx, w, h, angle, height, bob, time) {
        ctx.save();
        const pillarRadius = Math.min(w, h) * 0.08;
        const pillarGrad = ctx.createLinearGradient(-pillarRadius, 0, pillarRadius, 0);
        pillarGrad.addColorStop(0, '#3d3530');
        pillarGrad.addColorStop(0.5, '#5a5045');
        pillarGrad.addColorStop(1, '#3d3530');
        ctx.fillStyle = pillarGrad;
        ctx.beginPath();
        ctx.arc(0, 0, pillarRadius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'rgba(30, 25, 20, 0.5)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 8; i++) {
            const y = -pillarRadius + i * (pillarRadius * 2 / 8);
            ctx.beginPath();
            ctx.moveTo(-Math.sqrt(pillarRadius * pillarRadius - y * y), y);
            ctx.lineTo(Math.sqrt(pillarRadius * pillarRadius - y * y), y);
            ctx.stroke();
        }
        ctx.restore();
    }

    function drawTowerWalls(ctx, w, h, angle, height, time) {
        ctx.save();
        const wallDist = Math.min(w, h) * 0.45;

        for (let i = 0; i < 12; i++) {
            const wallAngle = (i / 12) * Math.PI * 2 + angle;
            const relativeAngle = ((wallAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);

            if (relativeAngle > Math.PI * 0.3 && relativeAngle < Math.PI * 1.7) {
                const depth = Math.sin(wallAngle + Math.PI * 0.5);
                const wallBrightness = 0.3 + depth * 0.2;

                ctx.fillStyle = `rgba(${70 * wallBrightness}, ${60 * wallBrightness}, ${80 * wallBrightness}, 0.8)`;

                const x1 = Math.cos(wallAngle) * wallDist;
                const y1 = Math.sin(wallAngle) * wallDist * 0.3;
                const x2 = Math.cos(wallAngle + Math.PI / 12) * wallDist;
                const y2 = Math.sin(wallAngle + Math.PI / 12) * wallDist * 0.3;

                ctx.beginPath();
                ctx.moveTo(x1, y1 - h * 0.3);
                ctx.lineTo(x2, y2 - h * 0.3);
                ctx.lineTo(x2, y2 + h * 0.4);
                ctx.lineTo(x1, y1 + h * 0.4);
                ctx.closePath();
                ctx.fill();

                ctx.strokeStyle = 'rgba(40, 35, 45, 0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        const torchPositions = [0, 2, 4, 6, 8, 10];
        torchPositions.forEach((pos, idx) => {
            const torchAngle = (pos / 12) * Math.PI * 2 + angle;
            const relativeAngle = ((torchAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);

            if (relativeAngle > Math.PI * 0.4 && relativeAngle < Math.PI * 1.6) {
                const tx = Math.cos(torchAngle) * wallDist * 0.9;
                const ty = Math.sin(torchAngle) * wallDist * 0.25;

                const glowGrad = ctx.createRadialGradient(tx, ty, 0, tx, ty, 60);
                glowGrad.addColorStop(0, `rgba(255, 180, 80, ${0.4 + Math.sin(time * 0.005 + idx) * 0.1})`);
                glowGrad.addColorStop(0.5, 'rgba(255, 150, 50, 0.2)');
                glowGrad.addColorStop(1, 'transparent');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(tx, ty, 60, 0, Math.PI * 2);
                ctx.fill();

                drawFlame(ctx, tx, ty, time + idx * 500);
            }
        });

        ctx.restore();
    }

    function drawFlame(ctx, x, y, time) {
        ctx.save();

        const outerFlame = ctx.createRadialGradient(x, y - 10, 0, x, y - 10, 15);
        outerFlame.addColorStop(0, 'rgba(255, 200, 100, 0.9)');
        outerFlame.addColorStop(0.5, 'rgba(255, 120, 30, 0.7)');
        outerFlame.addColorStop(1, 'rgba(255, 60, 10, 0)');

        ctx.fillStyle = outerFlame;
        ctx.beginPath();
        ctx.moveTo(x, y + 5);
        ctx.quadraticCurveTo(x - 8 - Math.sin(time * 0.01) * 3, y - 5, x - 3 + Math.sin(time * 0.015) * 2, y - 15 - Math.sin(time * 0.008) * 5);
        ctx.quadraticCurveTo(x, y - 25 - Math.sin(time * 0.012) * 5, x + 3 + Math.sin(time * 0.013) * 2, y - 15 - Math.sin(time * 0.009) * 5);
        ctx.quadraticCurveTo(x + 8 + Math.sin(time * 0.011) * 3, y - 5, x, y + 5);
        ctx.fill();

        const innerFlame = ctx.createRadialGradient(x, y - 8, 0, x, y - 8, 8);
        innerFlame.addColorStop(0, 'rgba(255, 255, 200, 0.9)');
        innerFlame.addColorStop(1, 'rgba(255, 200, 100, 0)');

        ctx.fillStyle = innerFlame;
        ctx.beginPath();
        ctx.arc(x, y - 8, 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    function drawVisibleSteps(ctx, w, h, angle, height, bob, time) {
        ctx.save();

        const numSteps = 20;
        const stepHeight = h * 0.04;
        const stepWidth = w * 0.25;
        const spiralRadius = Math.min(w, h) * 0.25;

        for (let i = 0; i < numSteps; i++) {
            const stepAngle = angle + (i / numSteps) * Math.PI * 1.5;
            const stepY = h * 0.3 - i * stepHeight + bob * h * 50;

            const relativeAngle = ((stepAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            if (relativeAngle > Math.PI * 0.2 && relativeAngle < Math.PI * 1.3) {
                const perspective = 1 - (i / numSteps) * 0.6;
                const dist = spiralRadius * perspective;

                const stepX = Math.cos(stepAngle) * dist;
                const stepZ = Math.sin(stepAngle) * dist;

                if (stepZ > -50) {
                    const stepBrightness = 0.4 + stepZ / spiralRadius * 0.3;

                    ctx.fillStyle = `rgba(${90 * stepBrightness}, ${80 * stepBrightness}, ${70 * stepBrightness}, 0.9)`;
                    ctx.beginPath();

                    const topLeft = stepX - stepWidth * 0.3 * perspective;
                    const topRight = stepX + stepWidth * 0.3 * perspective;

                    ctx.moveTo(topLeft, stepY - stepHeight * 0.3);
                    ctx.lineTo(topRight, stepY - stepHeight * 0.3);
                    ctx.lineTo(topRight, stepY + stepHeight * 0.3);
                    ctx.lineTo(topLeft, stepY + stepHeight * 0.3);
                    ctx.closePath();
                    ctx.fill();

                    ctx.fillStyle = `rgba(${60 * stepBrightness}, ${50 * stepBrightness}, ${40 * stepBrightness}, 0.8)`;
                    ctx.fillRect(topLeft, stepY + stepHeight * 0.1, (topRight - topLeft), stepHeight * 0.4);

                    ctx.strokeStyle = `rgba(150, 130, 100, ${stepBrightness * 0.5})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(topLeft, stepY - stepHeight * 0.3);
                    ctx.lineTo(topRight, stepY - stepHeight * 0.3);
                    ctx.stroke();
                }
            }
        }

        ctx.restore();
    }

    function drawClimbParticles(ctx, w, h, height, time) {
        for (let i = 0; i < 30; i++) {
            const px = (Math.sin(time * 0.0005 + i * 0.7) * w * 0.3);
            const py = (Math.cos(time * 0.0007 + i * 0.5) * h * 0.4 + (time * 0.02 + i * 20) % (h * 0.8)) - h * 0.4;
            const size = 1 + Math.sin(time * 0.003 + i) * 0.5;
            const opacity = 0.3 + Math.sin(time * 0.002 + i * 0.3) * 0.2;

            ctx.beginPath();
            ctx.arc(px, py, size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 220, 180, ${opacity})`;
            ctx.fill();
        }

        const glowOpacity = 0.15 + Math.sin(time * 0.002) * 0.05;
        const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.min(w, h) * 0.5);
        glowGrad.addColorStop(0, `rgba(255, 200, 100, ${glowOpacity})`);
        glowGrad.addColorStop(0.5, `rgba(255, 180, 80, ${glowOpacity * 0.5})`);
        glowGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = glowGrad;
        ctx.fillRect(-w, -h, w * 2, h * 2);
    }

    function performClimbTransition() {
        const startTime = Date.now();
        const totalDuration = CONFIG.transitionDuration;
        const phase1Duration = totalDuration * 0.25;
        const phase2Duration = totalDuration * 0.50;
        const phase3Duration = totalDuration * 0.25;

        mainCanvas.style.opacity = '0';
        blessingEl.classList.remove('show');

        function animateClimb() {
            const elapsed = Date.now() - startTime;
            let phase = 0;
            let phaseProgress = 0;

            if (elapsed < phase1Duration) {
                phase = 0;
                phaseProgress = elapsed / phase1Duration;
            } else if (elapsed < phase1Duration + phase2Duration) {
                phase = 1;
                phaseProgress = (elapsed - phase1Duration) / phase2Duration;
            } else if (elapsed < totalDuration) {
                phase = 2;
                phaseProgress = (elapsed - phase1Duration - phase2Duration) / phase3Duration;
            } else {
                climbCtx.clearRect(0, 0, climbCanvas.width, climbCanvas.height);
                currentLevel++;
                levelParticles = [];
                sceneInitialized = false;
                levelIndicator.textContent = `第 ${currentLevel + 1} 层`;
                mainCanvas.style.opacity = '1';
                showBlessing();

                if (currentLevel >= CONFIG.levels.length - 1) {
                    climbBtn.style.display = 'none';
                    levelIndicator.style.display = 'none';
                }

                isTransitioning = false;
                return;
            }

            const easedProgress = easeInOutCubic(phaseProgress);
            drawSpiralStaircase(climbCtx, climbCanvas.width, climbCanvas.height, easedProgress, phase, elapsed);

            climbAnimationId = requestAnimationFrame(animateClimb);
        }

        animateClimb();
    }

    function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    // ============================================
    // 事件处理
    // ============================================
    function climbUp() {
        if (isTransitioning || currentLevel >= CONFIG.levels.length - 1) return;
        isTransitioning = true;
        performClimbTransition();
    }

    function showBlessing() {
        const blessing = CONFIG.levels[currentLevel].blessing;
        blessingEl.textContent = blessing;
        blessingEl.classList.add('show');

        if (currentLevel < CONFIG.levels.length - 1) {
            setTimeout(() => {
                blessingEl.classList.remove('show');
            }, CONFIG.blessingShowDuration);
        }
    }

    // ============================================
    // 动画循环
    // ============================================
    function animate(timestamp) {
        animationTime = timestamp;

        const w = mainCanvas.width;
        const h = mainCanvas.height;

        drawBackground(bgCtx, w, h, animationTime);

        ctx.clearRect(0, 0, w, h);
        drawStoneWindow(ctx, w, h, animationTime);

        requestAnimationFrame(animate);
    }

    // ============================================
    // 启动
    // ============================================
    init();

    setTimeout(() => {
        showBlessing();
    }, 500);
    </script>
</body>
